site_name: AI Imaging Agent
site_description: Intelligent RAG + AI agent for discovering imaging software
site_author: SDSC-ORDES
site_url: https://sdsc-ordes.github.io/ai-agent/

repo_name: sdsc-ordes/ai-agent
repo_url: https://github.com/sdsc-ordes/ai-agent
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    # Palette toggle for light mode
    - scheme: default
      primary: teal
      accent: green
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    # Palette toggle for dark mode
    - scheme: slate
      primary: teal
      accent: green
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  
  font:
    text: Roboto
    code: Roboto Mono
  
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.footer
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
  
  icon:
    repo: fontawesome/brands/github

plugins:
  - search
  - tags

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - attr_list
  - md_in_html
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - tables
  - footnotes
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started:
      - Installation: getting-started/installation.md
      - Quick Start: getting-started/quickstart.md
      - Configuration: getting-started/configuration.md
  - User Guide:
      - Using the Chat Interface: user-guide/chat-interface.md
      - Supported File Formats: user-guide/file-formats.md
      - Understanding Recommendations: user-guide/recommendations.md
      - Running Demos: user-guide/running-demos.md
      - Advanced Features: user-guide/advanced-features.md
  - Architecture:
      - Overview: architecture/overview.md
      - Retrieval Pipeline: architecture/retrieval.md
      - Agent & VLM Selection: architecture/agent.md
      - Software Catalog: architecture/catalog.md
  - Development:
      - Project Structure: development/structure.md
      - Contributing: development/contributing.md
      - Testing: development/testing.md
  - Reference:
      - CLI Commands: reference/cli.md
      - Environment Variables: reference/environment.md
      - Changelog: reference/changelog.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/sdsc-ordes/ai-agent

copyright: Copyright &copy; 2024-2026 SDSC-ORDES
