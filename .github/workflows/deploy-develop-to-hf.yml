name: Deploy develop to Hugging Face Space (SDSC/ai-agent)

on:
  push:
    branches: [ develop ]
  # optional: manual trigger from Actions tab
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # required so git push works correctly
          lfs: true        # good idea if you have large models/assets
          # submodules: recursive   # uncomment if you ever add submodules

      - name: Push develop to HF Space SDSC/ai-agent
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # Push local 'develop' to the Space's 'main' branch
          git push --force \
            https://SDSC:${HF_TOKEN}@huggingface.co/spaces/SDSC/ai-agent \
            develop:main